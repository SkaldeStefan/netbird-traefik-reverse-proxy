api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      middlewares:
        - security-headers@file

providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: "${TRAEFIK_PROXY_NETWORK:?set TRAEFIK_PROXY_NETWORK in .env}"
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  dns:
    acme:
      email: "${ACME_EMAIL}"
      storage: /certs/acme.json
      dnsChallenge:
        provider: "${ACME_DNS_PROVIDER:-hetzner}"
        resolvers:
          - "${ACME_DNS_RESOLVER_1:-1.1.1.1:53}"
          - "${ACME_DNS_RESOLVER_2:-8.8.8.8:53}"

log:
  level: "${TRAEFIK_LOG_LEVEL:-INFO}"

accessLog: {}
